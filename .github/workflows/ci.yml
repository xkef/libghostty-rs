name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64
            runner: macos-latest
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
          - name: Linux x86_64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build
        run: nix develop -c cargo build

      - name: Check pkg-config path
        run: |
          PKG_CONFIG_PATH=$(find target/debug/build -path '*/out/ghostty-install/share/pkgconfig' | head -1)
          test -n "$PKG_CONFIG_PATH"
          export PKG_CONFIG_PATH
          nix develop -c cargo check -p libghostty-vt-sys --features pkg-config
